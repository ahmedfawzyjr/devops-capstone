# ─────────────────────────────────────────────────────────────────────────────
# GitHub Actions — Standalone Test Workflow
# Task 7: Automated test for "Add an ingredient to a food delivery app"
# ─────────────────────────────────────────────────────────────────────────────
name: Automated Tests — Food Delivery App

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  run-tests:
    name: "Run All Tests"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare package structure
        run: |
          touch app/__init__.py
          touch app/tests/__init__.py

      - name: Run tests — Story: Add an ingredient to a food delivery app
        run: |
          echo "══════════════════════════════════════════════════════════"
          echo "  🧪 Running: Story — Add an ingredient to a food delivery app"
          echo "══════════════════════════════════════════════════════════"
          python -m pytest app/tests/test_main.py \
            -v \
            --tb=long \
            --cov=app \
            --cov-report=term-missing

      - name: Show test results summary
        if: always()
        run: |
          echo "══════════════════════════════════════════════════════════"
          echo "  ✅ Test execution complete"
          echo "══════════════════════════════════════════════════════════"
