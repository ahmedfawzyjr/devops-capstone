version: "3.9"

services:
  # ── Main Application ──────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devops-capstone-app
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - PORT=5000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - capstone-network

  # ── Test Runner ───────────────────────────────────
  test:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devops-capstone-test
    command: ["python", "-m", "pytest", "app/tests/", "-v", "--tb=short", "--cov=app", "--cov-report=term-missing"]
    environment:
      - FLASK_ENV=testing
    networks:
      - capstone-network
    profiles:
      - test

networks:
  capstone-network:
    driver: bridge
